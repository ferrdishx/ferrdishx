<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0d1117; }

      .main-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 700;
        fill: #3DDC84;
        letter-spacing: 6px;
      }

      .glitch-r {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 700;
        fill: #ff004c;
        letter-spacing: 6px;
        opacity: 0;
        animation: glitch-r 3.5s infinite;
      }

      .glitch-b {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 700;
        fill: #00eaff;
        letter-spacing: 6px;
        opacity: 0;
        animation: glitch-b 3.5s infinite;
      }

      .glow-line {
        fill: none;
        stroke: #3DDC84;
        stroke-width: 1.5;
        opacity: 0;
        animation: glow-sweep 5s infinite linear;
      }

      .cursor {
        fill: #3DDC84;
        animation: blink 1s step-end infinite;
      }

      .sub-text {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        fill: #3DDC84;
        letter-spacing: 5px;
        animation: pulse 4s infinite alternate;
      }

      .bracket {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 72px;
        font-weight: 700;
        fill: #ffffff;
        opacity: 0.05;
        letter-spacing: 6px;
      }

      .ui-marks {
        stroke: #3DDC84;
        stroke-width: 1;
        opacity: 0.3;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes pulse {
        0% { opacity: 0.4; }
        100% { opacity: 0.8; }
      }

      @keyframes glitch-r {
        0%   { opacity: 0; transform: translate(0,0); }
        5%   { opacity: 0.8; transform: translate(-5px, 2px); }
        7%   { opacity: 0; transform: translate(0,0); }
        52%  { opacity: 0; transform: translate(0,0); }
        54%  { opacity: 0.7; transform: translate(4px, -3px) skewX(5deg); }
        56%  { opacity: 0; transform: skewX(0deg); }
        80%  { opacity: 0; }
        82%  { opacity: 0.5; transform: translate(-3px, 0px); }
        84%  { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes glitch-b {
        0%   { opacity: 0; transform: translate(0,0); }
        5%   { opacity: 0.8; transform: translate(5px, -2px); }
        7%   { opacity: 0; transform: translate(0,0); }
        52%  { opacity: 0; transform: translate(0,0); }
        54%  { opacity: 0.7; transform: translate(-4px, 3px) skewX(-5deg); }
        56%  { opacity: 0; transform: skewX(0deg); }
        80%  { opacity: 0; }
        82%  { opacity: 0.5; transform: translate(3px, 0px); }
        84%  { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes glow-sweep {
        0%   { opacity: 0; transform: translateY(-20px); }
        10%  { opacity: 0.8; }
        40%  { opacity: 0.8; }
        50%  { opacity: 0; transform: translateY(180px); }
        100% { opacity: 0; transform: translateY(180px); }
      }
    </style>

    <filter id="strong-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="15" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#3DDC84" stroke-width="1" opacity="0.06"/>
    </pattern>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050709" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="8"/>
  
  <rect width="100%" height="100%" fill="url(#scanlines)" rx="8"/>
  
  <rect width="100%" height="100%" fill="url(#vignette)" rx="8"/>

  <g class="ui-marks">
    <path d="M 20 30 L 20 20 L 30 20" fill="none"/>
    <path d="M 780 30 L 780 20 L 770 20" fill="none"/>
    <path d="M 20 130 L 20 140 L 30 140" fill="none"/>
    <path d="M 780 130 L 780 140 L 770 140" fill="none"/>
  </g>

  <line x1="0" y1="0" x2="800" y2="0" class="glow-line"/>

  <g transform="translate(400, 80)">
    
    <text x="-340" y="22" text-anchor="middle" class="bracket">[</text>
    <text x="340" y="22" text-anchor="middle" class="bracket">]</text>

    <text x="0" y="20" text-anchor="middle" class="glitch-r">ferrdishx</text>
    <text x="0" y="20" text-anchor="middle" class="glitch-b">ferrdishx</text>

    <text x="0" y="20" text-anchor="middle" class="main-text" filter="url(#strong-glow)">ferrdishx</text>

    <text x="0" y="55" text-anchor="middle" class="sub-text">android modder · arch linux · system tweaker</text>

    <rect x="235" y="-30" width="12" height="52" rx="2" class="cursor" filter="url(#strong-glow)"/>
  </g>

  <rect width="798" height="158" x="1" y="1" fill="none" stroke="#3DDC84" stroke-width="1.5" rx="8" opacity="0.15"/>
</svg>
